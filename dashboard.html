<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Land - Личный кабинет</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }
    
    .dashboard-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    .dashboard-card h3 {
      margin-bottom: 15px;
      color: #333;
      border-bottom: 2px solid #2563eb;
      padding-bottom: 10px;
    }
    
    .my-cells-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 10px;
      margin-top: 15px;
    }
    
    .my-cell-item {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 10px;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
    }
    
    .my-cell-item:hover {
      border-color: #2563eb;
      transform: translateY(-2px);
    }
    
    .my-cell-item .coords {
      font-weight: bold;
      color: #2563eb;
    }
    
    .my-cell-item .price {
      font-size: 14px;
      color: #059669;
    }
    
    .transaction-item {
      padding: 10px;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .transaction-item:last-child {
      border-bottom: none;
    }
    
    .transaction-status {
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: bold;
    }
    
    .status-completed {
      background: #d1fae5;
      color: #059669;
    }
    
    .status-pending {
      background: #fef3c7;
      color: #d97706;
    }
    
    .edit-form {
      margin-top: 20px;
    }
    
    .edit-form input,
    .edit-form textarea {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ddd;
      border-radius: 6px;
    }
    
    .color-picker {
      display: flex;
      gap: 10px;
      margin: 15px 0;
      flex-wrap: wrap;
    }
    
    .color-option {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: 0.2s;
    }
    
    .color-option:hover,
    .color-option.selected {
      border-color: #2563eb;
      transform: scale(1.1);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo" onclick="window.location.href='index.html'" style="cursor: pointer;">
        🎮 Pixel Land
        <span>Личный кабинет</span>
      </div>
      <div>
        <span id="userEmail" style="margin-right: 15px;"></span>
        <button class="btn btn-outline" onclick="goToMap()">Карта</button>
        <button class="btn btn-primary" onclick="signOut()">Выход</button>
      </div>
    </div>
    
    <div id="loadingIndicator" class="loader" style="display: none; margin: 50px auto;"></div>
    
    <div id="dashboardContent" style="display: none;">
      <!-- Статистика пользователя -->
      <div class="stats">
        <div class="stat-card">
          <div class="stat-value" id="userCells">0</div>
          <div class="stat-label">Мои ячейки</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="userSpent">$0</div>
          <div class="stat-label">Потрачено</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="userClicks">0</div>
          <div class="stat-label">Переходов</div>
        </div>
      </div>
      
      <!-- Основной контент -->
      <div class="dashboard-grid">
        <!-- Мои ячейки -->
        <div class="dashboard-card">
          <h3>📦 Мои ячейки</h3>
          <div id="myCellsContainer" class="my-cells-grid"></div>
          <div id="noCells" style="text-align: center; padding: 30px; color: #666;">
            У вас пока нет ячеек. <a href="index.html">Купить на карте!</a>
          </div>
        </div>
        
        <!-- Редактирование ячейки -->
        <div class="dashboard-card" id="editCard" style="display: none;">
          <h3>✏️ Редактировать ячейку</h3>
          <div id="selectedCellInfo"></div>
          <div class="edit-form">
            <input type="text" id="cellTitle" placeholder="Название (например, Мой магазин)">
            <input type="url" id="cellLink" placeholder="Ссылка (https://...)">
            <textarea id="cellDescription" placeholder="Описание" rows="3"></textarea>
            
            <label>Цвет фона:</label>
            <div class="color-picker" id="colorPicker">
              <div class="color-option" style="background: #2563eb;" onclick="selectColor('#2563eb')"></div>
              <div class="color-option" style="background: #dc2626;" onclick="selectColor('#dc2626')"></div>
              <div class="color-option" style="background: #059669;" onclick="selectColor('#059669')"></div>
              <div class="color-option" style="background: #d97706;" onclick="selectColor('#d97706')"></div>
              <div class="color-option" style="background: #7c3aed;" onclick="selectColor('#7c3aed')"></div>
              <div class="color-option" style="background: #db2777;" onclick="selectColor('#db2777')"></div>
            </div>
            
            <button class="btn btn-success" onclick="saveCellChanges()" style="width: 100%; margin-top: 15px;">
              Сохранить изменения
            </button>
          </div>
        </div>
        
        <!-- История транзакций -->
        <div class="dashboard-card">
          <h3>💰 История платежей</h3>
          <div id="transactionsContainer"></div>
          <div id="noTransactions" style="text-align: center; padding: 30px; color: #666;">
            История платежей пуста
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Модалка предпросмотра -->
  <div id="previewModal" class="modal">
    <div class="modal-content">
      <h2>Предпросмотр ячейки</h2>
      <div id="previewContent" style="text-align: center; padding: 20px;">
        <div id="previewCell" style="width: 200px; height: 200px; margin: 20px auto; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold;"></div>
        <div id="previewTitle" style="font-size: 18px; margin: 10px 0;"></div>
        <div id="previewLink"></div>
      </div>
      <div class="modal-buttons">
        <button class="btn btn-outline" onclick="closeModal('previewModal')">Закрыть</button>
      </div>
    </div>
  </div>
  
  <script src="js/config.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/auth.js"></script>
  <script>
    let currentUser = null;
    let userCells = [];
    let selectedCell = null;
    let selectedColor = '#2563eb';
    
    // Загрузка данных
    async function loadDashboard() {
      showLoader(true);
      
      currentUser = await getCurrentUser();
      if (!currentUser) {
        window.location.href = 'index.html';
        return;
      }
      
      document.getElementById('userEmail').textContent = `👤 ${currentUser.email}`;
      
      await Promise.all([
        loadUserCells(),
        loadTransactions()
      ]);
      
      document.getElementById('dashboardContent').style.display = 'block';
      showLoader(false);
    }
    
    // Загрузка ячеек пользователя
    async function loadUserCells() {
      const { data: cells, error } = await supabase
        .from('cells')
        .select('*')
        .eq('owner_id', currentUser.id)
        .order('x')
        .order('y');
      
      if (error) {
        showNotification('Ошибка загрузки ячеек', 'error');
        return;
      }
      
      userCells = cells;
      displayUserCells();
    }
    
    // Отображение ячеек пользователя
    function displayUserCells() {
      const container = document.getElementById('myCellsContainer');
      const noCells = document.getElementById('noCells');
      
      if (userCells.length === 0) {
        container.innerHTML = '';
        noCells.style.display = 'block';
        document.getElementById('userCells').textContent = '0';
        return;
      }
      
      noCells.style.display = 'none';
      document.getElementById('userCells').textContent = userCells.length;
      
      let totalSpent = 0;
      let html = '';
      
      userCells.forEach(cell => {
        totalSpent += cell.price;
        html += `
          <div class="my-cell-item" onclick="selectCellForEdit(${cell.id})">
            <div class="coords">(${cell.x}, ${cell.y})</div>
            <div class="price">$${cell.price}</div>
            <div style="font-size: 12px; color: #666;">
              ${cell.content?.title || 'Без названия'}
            </div>
          </div>
        `;
      });
      
      container.innerHTML = html;
      document.getElementById('userSpent').textContent = `$${totalSpent}`;
    }
    
    // Выбор ячейки для редактирования
    async function selectCellForEdit(cellId) {
      selectedCell = userCells.find(c => c.id === cellId);
      if (!selectedCell) return;
      
      document.getElementById('editCard').style.display = 'block';
      document.getElementById('selectedCellInfo').innerHTML = `
        <p><strong>Ячейка (${selectedCell.x}, ${selectedCell.y})</strong></p>
        <p>Куплена: $${selectedCell.price}</p>
      `;
      
      // Заполняем форму
      document.getElementById('cellTitle').value = selectedCell.content?.title || '';
      document.getElementById('cellLink').value = selectedCell.content?.link || '';
      document.getElementById('cellDescription').value = selectedCell.content?.description || '';
      
      selectedColor = selectedCell.content?.color || '#2563eb';
      highlightSelectedColor(selectedColor);
      
      // Прокручиваем к форме
      document.getElementById('editCard').scrollIntoView({ behavior: 'smooth' });
    }
    
    // Выбор цвета
    function selectColor(color) {
      selectedColor = color;
      highlightSelectedColor(color);
    }
    
    function highlightSelectedColor(color) {
      document.querySelectorAll('.color-option').forEach(opt => {
        opt.classList.remove('selected');
        if (opt.style.background === color || 
            opt.style.background === `rgb(${hexToRgb(color)})`) {
          opt.classList.add('selected');
        }
      });
    }
    
    function hexToRgb(hex) {
      const r = parseInt(hex.slice(1,3), 16);
      const g = parseInt(hex.slice(3,5), 16);
      const b = parseInt(hex.slice(5,7), 16);
      return `${r}, ${g}, ${b}`;
    }
    
    // Сохранение изменений
    async function saveCellChanges() {
      if (!selectedCell) return;
      
      const updates = {
        content: {
          ...selectedCell.content,
          title: document.getElementById('cellTitle').value,
          link: document.getElementById('cellLink').value,
          description: document.getElementById('cellDescription').value,
          color: selectedColor
        }
      };
      
      const { error } = await supabase
        .from('cells')
        .update(updates)
        .eq('id', selectedCell.id);
      
      if (error) {
        showNotification('Ошибка сохранения', 'error');
      } else {
        showNotification('Изменения сохранены!', 'success');
        
        // Обновляем локальные данные
        selectedCell.content = updates.content;
        const index = userCells.findIndex(c => c.id === selectedCell.id);
        if (index !== -1) {
          userCells[index].content = updates.content;
        }
        
        // Показываем предпросмотр
        showPreview();
      }
    }
    
    // Предпросмотр
    function showPreview() {
      const modal = document.getElementById('previewModal');
      const previewCell = document.getElementById('previewCell');
      const previewTitle = document.getElementById('previewTitle');
      const previewLink = document.getElementById('previewLink');
      
      previewCell.style.backgroundColor = selectedColor;
      previewCell.textContent = `(${selectedCell.x}, ${selectedCell.y})`;
      
      previewTitle.textContent = document.getElementById('cellTitle').value || 'Без названия';
      
      const link = document.getElementById('cellLink').value;
      previewLink.innerHTML = link ? `<a href="${link}" target="_blank">${link}</a>` : '';
      
      modal.classList.add('active');
    }
    
    // Загрузка транзакций
    async function loadTransactions() {
      const { data: transactions, error } = await supabase
        .from('transactions')
        .select('*')
        .eq('user_id', currentUser.id)
        .order('created_at', { ascending: false })
        .limit(20);
      
      if (error) {
        showNotification('Ошибка загрузки транзакций', 'error');
        return;
      }
      
      displayTransactions(transactions);
    }
    
    // Отображение транзакций
    function displayTransactions(transactions) {
      const container = document.getElementById('transactionsContainer');
      const noTransactions = document.getElementById('noTransactions');
      
      if (!transactions || transactions.length === 0) {
        container.innerHTML = '';
        noTransactions.style.display = 'block';
        return;
      }
      
      noTransactions.style.display = 'none';
      
      let html = '';
      transactions.forEach(t => {
        const date = new Date(t.created_at).toLocaleDateString();
        html += `
          <div class="transaction-item">
            <div>
              <div style="font-weight: bold;">$${t.amount}</div>
              <div style="font-size: 12px; color: #666;">${date}</div>
            </div>
            <div>
              <span class="transaction-status status-${t.status}">${t.status}</span>
            </div>
          </div>
        `;
      });
      
      container.innerHTML = html;
    }
    
    // Навигация
    function goToMap() {
      window.location.href = 'index.html';
    }
    
    // Показать/скрыть загрузчик
    function showLoader(show) {
      document.getElementById('loadingIndicator').style.display = show ? 'block' : 'none';
    }
    
    // Инициализация
    document.addEventListener('DOMContentLoaded', loadDashboard);
  </script>
</body>
</html>
