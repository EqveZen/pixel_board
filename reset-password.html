<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Land - Сброс пароля</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        
        .auth-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .auth-card .logo {
            text-align: center;
            font-size: 32px;
            color: #2563eb;
            margin-bottom: 30px;
            cursor: pointer;
        }
        
        .auth-card h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        
        .auth-card p {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        
        .auth-card input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
        }
        
        .auth-card input:focus {
            border-color: #2563eb;
            outline: none;
        }
        
        .auth-card button {
            width: 100%;
            padding: 15px;
            margin: 20px 0;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .auth-card button:hover {
            background: #1d4ed8;
        }
        
        .auth-card .links {
            text-align: center;
            margin-top: 20px;
        }
        
        .auth-card .links a {
            color: #2563eb;
            text-decoration: none;
        }
        
        .auth-card .error {
            color: #dc2626;
            text-align: center;
            margin: 10px 0;
        }
        
        .auth-card .success {
            color: #059669;
            text-align: center;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="logo" onclick="window.location.href='index.html'">
                🎮 Pixel Land
            </div>
            
            <h2>Новый пароль</h2>
            
            <p>Введите новый пароль для вашего аккаунта</p>
            
            <div id="errorMessage" class="error" style="display: none;"></div>
            <div id="successMessage" class="success" style="display: none;"></div>
            
            <form id="resetForm" onsubmit="handleResetPassword(event)">
                <input type="password" id="password" placeholder="Новый пароль" required minlength="6">
                <input type="password" id="confirmPassword" placeholder="Подтвердите пароль" required>
                
                <button type="submit">Сохранить пароль</button>
            </form>
            
            <div class="links">
                <a href="login.html">Вспомнили пароль? Войти</a>
            </div>
        </div>
    </div>
    
    <div id="notification" class="notification">
        <span id="notificationMessage"></span>
    </div>
    
    <script src="js/config.js"></script>
    <script src="js/notifications.js"></script>
    <script>
        async function handleResetPassword(event) {
            event.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            
            if (password !== confirm) {
                showError('Пароли не совпадают');
                return;
            }
            
            if (password.length < 6) {
                showError('Пароль должен быть не менее 6 символов');
                return;
            }
            
            try {
                const { error } = await supabase.auth.updateUser({
                    password: password
                });
                
                if (error) throw error;
                
                showSuccess('Пароль успешно изменен!');
                
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 3000);
                
            } catch (error) {
                showError('Ошибка: ' + error.message);
            }
        }
        
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }
        
        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
        }
        
        // Проверяем наличие токена сброса
        async function checkAccess() {
            const { data: { session } } = await supabase.auth.getSession();
            
            // Если нет сессии и нет hash в URL (токен сброса), отправляем на логин
            if (!session && !window.location.hash) {
                window.location.href = 'login.html';
            }
        }
        
        checkAccess();
    </script>
</body>
</html>
